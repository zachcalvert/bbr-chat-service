<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Incubator{% endblock %}</title>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <style>
        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --success: #059669;
            --danger: #dc2626;
            --warning: #d97706;
            --gray-50: #f9fafb;
            --gray-100: #f3f4f6;
            --gray-200: #e5e7eb;
            --gray-300: #d1d5db;
            --gray-400: #9ca3af;
            --gray-500: #6b7280;
            --gray-600: #4b5563;
            --gray-700: #374151;
            --gray-800: #1f2937;
            --gray-900: #111827;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            line-height: 1.6;
            color: var(--gray-800);
            background: var(--gray-50);
        }

        a {
            color: var(--primary);
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        /* Layout */
        .app-container {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 220px;
            background: var(--gray-800);
            color: white;
            padding: 1rem 0;
            flex-shrink: 0;
        }

        .sidebar-brand {
            padding: 0 1rem 1rem;
            border-bottom: 1px solid var(--gray-700);
            margin-bottom: 1rem;
        }

        .sidebar-brand h1 {
            font-size: 1.25rem;
            color: white;
        }

        .sidebar-nav a {
            display: block;
            padding: 0.75rem 1rem;
            color: var(--gray-300);
            transition: background 0.2s;
        }

        .sidebar-nav a:hover,
        .sidebar-nav a.active {
            background: var(--gray-700);
            color: white;
            text-decoration: none;
        }

        .main-content {
            flex: 1;
            padding: 2rem;
            max-width: 1200px;
        }

        /* Page header */
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .page-header h1 {
            font-size: 1.75rem;
            color: var(--gray-900);
        }

        .back-link {
            font-size: 0.875rem;
            color: var(--gray-500);
            display: block;
            margin-bottom: 0.5rem;
        }

        /* Buttons */
        .btn {
            display: inline-block;
            padding: 0.5rem 1rem;
            border-radius: 0.375rem;
            font-weight: 500;
            font-size: 0.875rem;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
            text-decoration: none;
        }

        .btn-secondary {
            background: var(--gray-200);
            color: var(--gray-700);
        }

        .btn-secondary:hover {
            background: var(--gray-300);
            text-decoration: none;
        }

        .btn-danger {
            background: var(--danger);
            color: white;
        }

        .btn-danger:hover {
            background: #b91c1c;
            text-decoration: none;
        }

        .btn-block {
            display: block;
            width: 100%;
            text-align: center;
        }

        .btn-icon {
            background: none;
            border: none;
            color: var(--gray-400);
            cursor: pointer;
            padding: 0.25rem;
        }

        .btn-icon:hover {
            color: var(--danger);
        }

        /* Badges */
        .badge {
            display: inline-block;
            padding: 0.25rem 0.5rem;
            border-radius: 0.25rem;
            font-size: 0.75rem;
            font-weight: 500;
            background: var(--gray-200);
            color: var(--gray-700);
        }

        .badge-success, .badge-completed {
            background: #d1fae5;
            color: var(--success);
        }

        .badge-muted, .badge-pending {
            background: var(--gray-200);
            color: var(--gray-500);
        }

        .badge-running {
            background: #dbeafe;
            color: var(--primary);
        }

        .badge-failed {
            background: #fee2e2;
            color: var(--danger);
        }

        /* Forms */
        .form {
            max-width: 600px;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: var(--gray-700);
        }

        .form-input,
        .form-textarea {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--gray-300);
            border-radius: 0.375rem;
            font-size: 1rem;
            transition: border-color 0.2s;
        }

        .form-input:focus,
        .form-textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .checkbox-group label {
            margin: 0;
            font-weight: normal;
        }

        .help-text {
            font-size: 0.875rem;
            color: var(--gray-500);
            margin-top: 0.25rem;
        }

        .form-actions {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
        }

        .error {
            color: var(--danger);
            font-size: 0.875rem;
        }

        /* Cards */
        .entry-card,
        .topic-card,
        .page-card,
        .conversation-card,
        .chunk-card {
            background: white;
            border: 1px solid var(--gray-200);
            border-radius: 0.5rem;
            padding: 1rem;
            margin-bottom: 1rem;
        }

        .entry-card h3,
        .topic-card h3,
        .page-card h4 {
            margin-bottom: 0.5rem;
        }

        .entry-preview,
        .keywords {
            color: var(--gray-600);
            font-size: 0.875rem;
            margin-bottom: 0.5rem;
        }

        .entry-meta,
        .topic-meta,
        .page-meta {
            font-size: 0.75rem;
            color: var(--gray-500);
            display: flex;
            gap: 1rem;
        }

        .chunk-card {
            background: var(--gray-50);
            font-size: 0.875rem;
        }

        .chunk-index {
            font-weight: 600;
            color: var(--primary);
        }

        /* Filter bar */
        .filter-bar {
            display: flex;
            gap: 0.5rem;
            align-items: center;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }

        .filter-bar span {
            color: var(--gray-500);
            font-size: 0.875rem;
        }

        .filter-bar a {
            padding: 0.25rem 0.75rem;
            border-radius: 1rem;
            font-size: 0.875rem;
            background: var(--gray-100);
            color: var(--gray-600);
        }

        .filter-bar a:hover,
        .filter-bar a.active {
            background: var(--primary);
            color: white;
            text-decoration: none;
        }

        /* Content sections */
        .content-section {
            margin-top: 2rem;
        }

        .content-section h2 {
            font-size: 1.25rem;
            margin-bottom: 1rem;
            color: var(--gray-800);
        }

        .section-divider {
            border-top: 1px solid var(--gray-200);
            margin: 2rem 0;
        }

        .prose {
            color: var(--gray-700);
        }

        .info-row {
            display: flex;
            gap: 1rem;
            padding: 0.75rem 0;
            border-bottom: 1px solid var(--gray-100);
        }

        .info-row strong {
            min-width: 150px;
            color: var(--gray-600);
        }

        .info-row.error {
            color: var(--danger);
        }

        /* Tables */
        .data-table {
            width: 100%;
            border-collapse: collapse;
        }

        .data-table th,
        .data-table td {
            padding: 0.75rem;
            text-align: left;
            border-bottom: 1px solid var(--gray-200);
        }

        .data-table th {
            font-weight: 500;
            color: var(--gray-600);
            background: var(--gray-50);
        }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 3rem;
            color: var(--gray-500);
        }

        .empty-state .btn {
            margin-top: 1rem;
        }

        /* Dashboard */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: white;
            border: 1px solid var(--gray-200);
            border-radius: 0.5rem;
            padding: 1.5rem;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 600;
            color: var(--gray-900);
        }

        .stat-label {
            font-size: 0.875rem;
            color: var(--gray-500);
        }

        /* Chat layout */
        .chat-layout {
            display: flex;
            gap: 1rem;
            height: calc(100vh - 6rem);
        }

        .chat-sidebar {
            width: 250px;
            flex-shrink: 0;
        }

        .sidebar-conversations {
            margin-top: 1rem;
        }

        .sidebar-conv {
            display: block;
            padding: 0.75rem;
            border-radius: 0.375rem;
            color: var(--gray-600);
            font-size: 0.875rem;
            margin-bottom: 0.25rem;
        }

        .sidebar-conv:hover,
        .sidebar-conv.active {
            background: var(--gray-100);
            text-decoration: none;
        }

        .sidebar-conv.active {
            color: var(--primary);
        }

        .chat-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: white;
            border: 1px solid var(--gray-200);
            border-radius: 0.5rem;
            overflow: hidden;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
        }

        .message {
            margin-bottom: 1rem;
            padding: 1rem;
            border-radius: 0.5rem;
        }

        .message-user {
            background: var(--gray-100);
        }

        .message-assistant {
            background: #eff6ff;
        }

        .message-role {
            font-weight: 600;
            font-size: 0.75rem;
            text-transform: uppercase;
            color: var(--gray-500);
            margin-bottom: 0.5rem;
        }

        .message-content {
            color: var(--gray-800);
        }

        .message-sources {
            margin-top: 0.75rem;
            padding-top: 0.75rem;
            border-top: 1px solid var(--gray-200);
            font-size: 0.75rem;
        }

        .source-badge {
            display: inline-block;
            background: var(--gray-100);
            padding: 0.25rem 0.5rem;
            border-radius: 0.25rem;
            margin-right: 0.5rem;
            margin-top: 0.25rem;
        }

        .empty-chat {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--gray-400);
        }

        .chat-input {
            display: flex;
            gap: 0.5rem;
            padding: 1rem;
            border-top: 1px solid var(--gray-200);
            background: var(--gray-50);
        }

        .chat-input textarea {
            flex: 1;
            padding: 0.75rem;
            border: 1px solid var(--gray-300);
            border-radius: 0.375rem;
            resize: none;
            font-size: 1rem;
        }

        .chat-input textarea:focus {
            outline: none;
            border-color: var(--primary);
        }

        .typing {
            color: var(--gray-400);
            font-style: italic;
        }

        /* Conversations list */
        .conversation-card {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .conversation-card a {
            flex: 1;
        }

        .conv-meta {
            font-size: 0.75rem;
            color: var(--gray-500);
            display: flex;
            gap: 1rem;
        }

        /* Messages */
        .messages {
            padding: 1rem;
            margin-bottom: 1rem;
        }

        .messages .success {
            background: #d1fae5;
            color: var(--success);
            padding: 0.75rem 1rem;
            border-radius: 0.375rem;
        }

        .messages .error {
            background: #fee2e2;
            color: var(--danger);
            padding: 0.75rem 1rem;
            border-radius: 0.375rem;
        }

        .messages .info {
            background: #dbeafe;
            color: var(--primary);
            padding: 0.75rem 1rem;
            border-radius: 0.375rem;
        }

        /* Actions */
        .actions {
            display: flex;
            gap: 0.5rem;
        }

        /* Entry meta footer */
        .entry-meta-footer {
            margin-top: 2rem;
            padding-top: 1rem;
            border-top: 1px solid var(--gray-200);
            font-size: 0.875rem;
            color: var(--gray-500);
        }

        .entry-meta-footer p {
            margin-bottom: 0.25rem;
        }

        /* Topic header */
        .topic-header {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        /* Page URL */
        .page-url {
            font-size: 0.75rem;
            color: var(--gray-400);
            word-break: break-all;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .app-container {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
            }

            .sidebar-nav {
                display: flex;
                overflow-x: auto;
            }

            .form-row {
                grid-template-columns: 1fr;
            }

            .chat-layout {
                flex-direction: column;
                height: auto;
            }

            .chat-sidebar {
                width: 100%;
            }

            .chat-main {
                height: 70vh;
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <nav class="sidebar">
            <div class="sidebar-brand">
                <h1>Incubator</h1>
            </div>
            <div class="sidebar-nav">
                <a href="{% url 'core:dashboard' %}" class="{% if request.resolver_match.url_name == 'dashboard' %}active{% endif %}">Dashboard</a>
                <a href="{% url 'knowledge:list' %}" class="{% if 'knowledge' in request.path %}active{% endif %}">Knowledge Base</a>
                <a href="{% url 'crawler:topic_list' %}" class="{% if 'crawler' in request.path %}active{% endif %}">Web Crawler</a>
                <a href="{% url 'chat:list' %}" class="{% if 'chat' in request.path %}active{% endif %}">Chat</a>
            </div>
        </nav>

        <main class="main-content">
            {% if messages %}
            <div class="messages">
                {% for message in messages %}
                <div class="{{ message.tags }}">{{ message }}</div>
                {% endfor %}
            </div>
            {% endif %}

            {% block content %}{% endblock %}
        </main>
    </div>
</body>
</html>
